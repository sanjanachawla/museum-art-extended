services:
  mysql:
    image: mysql:8.0
    container_name: met_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: met_art
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: met_api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: met_art
      DB_PORT: 3306
      API_HOST: 0.0.0.0
      API_PORT: 8000
      RUN_DB_INIT_ON_STARTUP: "true"
      CREATE_DB_IF_MISSING: "true"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  bootstrap:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: met_bootstrap
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: met_art
      DB_PORT: 3306
      CREATE_DB_IF_MISSING: "true"
      RUN_SEED: "true"
      INITIAL_ARTWORK_SEED_COUNT: 100
      INITIAL_ARTWORK_MINIMUM_COUNT: 1
      INITIAL_ARTWORK_MAX_ATTEMPTS: 300
      INITIAL_ARTWORK_RETRIES_PER_ARTWORK: 2
      INITIAL_ARTWORK_RETRY_BACKOFF_SECONDS: 1.5
      FAIL_ON_SEED_SHORTFALL: "false"
    command: ["python", "-m", "scripts.bootstrap_db"]


  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: met_dashboard
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
volumes:
  mysql_data:
